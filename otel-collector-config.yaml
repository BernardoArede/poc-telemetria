receivers:
  otlp:
    protocols:
      http:
      grpc:

exporters:
  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"
    default_labels_enabled:
      exporter: true
      job: true
  
  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true
      
  debug:
    verbosity: detailed

service:
  pipelines:
    logs:
      receivers: [otlp]
      exporters: [loki, debug] 
    traces:
      receivers: [otlp]
      exporters: [otlp/jaeger, debug]