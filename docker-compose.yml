services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: otel-collector
    ports:
      - "4317:4317" 
      - "4318:4318" 
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - telemetria-net

networks:
  telemetria-net:
    driver: bridge