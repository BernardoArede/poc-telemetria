services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: otel-collector
    ports:
      - "4317:4317" 
      - "4318:4318" 
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - telemetria-net

  # NOVO: O "Carteiro" (Message Broker)
  nats:
    image: nats:latest
    container_name: nats-server
    ports:
      - "4222:4222" # Porta principal onde o Go (Gateway e Worker) se vai ligar
      - "8222:8222" 
    networks:
      - telemetria-net

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - telemetria-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    networks:
      - telemetria-net

networks:
  telemetria-net:
    driver: bridge